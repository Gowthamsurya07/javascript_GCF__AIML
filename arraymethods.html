    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arraymethods</title>
</head>
<body>
    <script>
    var Product_Info=[1001,"Mobile",29000,"Samsung"]
    document.write("Product_Details are:"+Product_Info)
    document.write("<br>")
    document.write("The length of array is:"+Product_Info.length)
    document.write("<br>")
    document.write("1 element added in last position:"+Product_Info.push("Avenger"))
    document.write("<br>")
    document.write("Product_Details are:"+Product_Info)
    document.write("<br>")
    document.write("1 element added in last position:"+Product_Info.pop())
    document.write("<br>")
    document.write("Product_Details are:"+Product_Info)
    document.write("1 element added in last position:"+Product_Info.unshift())
    document.write("<br>")
    document.write("Product_Details are:"+Product_Info)
    document.write("<br>")
